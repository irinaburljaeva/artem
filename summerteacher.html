<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учительская панель · Last Lesson Before Summer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root{--sun:#FFB800;--ocean:#0057FF;--coral:#FF4D4D;--mint:#00C896;--dark:#0A0A14;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--dark);color:white;min-height:100vh;}
  .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 10%,#0057FF22 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,#FFB80022 0%,transparent 50%),#0A0A14;}
  .wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:28px 18px 80px;}
  .top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
  .title{font-family:'Syne',sans-serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:800;}
  .title small{display:block;font-family:'DM Sans',sans-serif;font-weight:400;font-size:13px;color:#ffffff88;margin-top:4px;letter-spacing:0;}
  .live{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);padding:8px 14px;border-radius:20px;font-size:12px;color:#ffffffaa;}
  .live .dot{width:9px;height:9px;border-radius:50%;background:#444;transition:background .3s;}
  .live.on .dot{background:var(--mint);box-shadow:0 0 8px var(--mint);}
  .live.on{color:var(--mint);}
  .student-bar{display:flex;align-items:center;gap:14px;background:rgba(255,184,0,0.07);border:1px solid rgba(255,184,0,0.2);border-radius:16px;padding:16px 20px;margin-bottom:8px;}
  .student-bar .who{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--sun);}
  .student-bar .meta{font-size:12px;color:#ffffff88;margin-top:2px;}
  .updated{font-size:12px;color:#ffffff66;margin-bottom:24px;text-align:right;}
  .card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:22px;margin-bottom:14px;backdrop-filter:blur(8px);}
  .card-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sun);margin-bottom:4px;}
  .card-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:8px;letter-spacing:.5px;}
  .badge.ok{background:rgba(0,200,150,0.15);color:var(--mint);}
  .badge.partial{background:rgba(255,184,0,0.15);color:var(--sun);}
  .badge.empty{background:rgba(255,255,255,0.08);color:#ffffff66;}
  .qa{margin-bottom:14px;}
  .qa:last-child{margin-bottom:0;}
  .q{font-size:13px;color:#ffffff99;margin-bottom:5px;line-height:1.5;}
  .q em{color:var(--sun);font-style:normal;text-decoration:underline dotted;}
  .a{background:rgba(255,255,255,0.04);border-left:3px solid var(--ocean);border-radius:0 8px 8px 0;padding:10px 14px;font-size:14px;color:#ffffffee;line-height:1.6;white-space:pre-wrap;}
  .a.empty{color:#ffffff44;font-style:italic;border-left-color:#444;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{background:rgba(0,87,255,0.12);border:1px solid rgba(0,87,255,0.3);color:#aabfff;font-size:12.5px;padding:6px 12px;border-radius:20px;}
  .chip.sun{background:rgba(255,184,0,0.12);border-color:rgba(255,184,0,0.3);color:#ffe4a0;}
  .chip.mint{background:rgba(0,200,150,0.12);border-color:rgba(0,200,150,0.3);color:#8ff0d0;}
  .none{color:#ffffff44;font-style:italic;font-size:13px;}
  .grow{display:grid;grid-template-columns:auto 1fr auto;gap:8px 12px;align-items:center;}
  .grow .num{color:#ffffff66;font-size:12px;}
  .grow .gq{font-size:13px;color:#ffffffcc;line-height:1.5;}
  .grow .gv{font-size:12px;font-weight:700;text-align:right;white-space:nowrap;}
  .grow .gv.right{color:var(--mint);}
  .grow .gv.wrong{color:var(--coral);}
  .grow .gv.none{color:#ffffff44;}
  .grow .gline{grid-column:1/-1;height:1px;background:rgba(255,255,255,0.06);}
  .scene-row{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.06);}
  .scene-row:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
  .scene-name{font-size:13px;font-weight:600;color:white;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .verdict{font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;}
  .verdict.good{background:rgba(0,200,150,0.15);color:var(--mint);}
  .verdict.bad{background:rgba(255,77,77,0.15);color:#ffaaaa;}
  .verdict.na{background:rgba(255,255,255,0.07);color:#ffffff66;}
  .wyr-row{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06);}
  .wyr-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .wyr-pick{font-size:13px;color:white;margin-bottom:6px;}
  .wyr-pick b{color:var(--sun);}
  .empty-state{text-align:center;padding:60px 20px;color:#ffffff66;}
  .empty-state .em{font-size:50px;margin-bottom:16px;}
  .empty-state .t{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#ffffffaa;margin-bottom:8px;}
  .refresh{background:var(--ocean);color:white;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:8px 16px;border-radius:20px;cursor:pointer;transition:all .2s;}
  .refresh:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,87,255,.3);}
  .score-pill{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--sun);}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="top">
    <div class="title">📋 Учительская панель<small>Ответы ученика обновляются автоматически</small></div>
    <div class="live" id="live"><span class="dot"></span><span id="liveTxt">подключение…</span></div>
  </div>

  <div id="content">
    <div class="empty-state">
      <div class="em">⏳</div>
      <div class="t">Загружаю данные…</div>
      <div>Как только ученик начнёт работать, ответы появятся здесь.</div>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import{getFirestore,doc,onSnapshot}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
const FB={apiKey:"AIzaSyCe3jIpFH630mfdkdxdTjCmquEGdPMvFHA",authDomain:"polytalky-2228d.firebaseapp.com",projectId:"polytalky-2228d",storageBucket:"polytalky-2228d.firebasestorage.app",messagingSenderId:"498740130503",appId:"1:498740130503:web:5e2061ec4011ec983144e2",measurementId:"G-3HCWZX1R92"};
const app=initializeApp(FB);const db=getFirestore(app);
const SHARED=doc(db,'lessonSessions','shared_lesson');
const live=document.getElementById('live');const liveTxt=document.getElementById('liveTxt');
const content=document.getElementById('content');

// reference data (must match the student version)
const BINGO_LABEL={};
const GRAMMAR=[{q:"If I had studied harder last year, I ___ the exam first time.",opts:["would pass","would have passed","will pass","had passed"],ans:1},{q:"The new library ___ by the mayor next Saturday.",opts:["will open","is being opened","will be opened","opens"],ans:2},{q:"She told me she ___ the report the following morning.",opts:["will finish","would finish","finishes","is finishing"],ans:1},{q:"I'd rather you ___ me before making that decision.",opts:["asked","ask","will ask","had asked"],ans:0},{q:"By the time you read this, I ___ for London.",opts:["will leave","will have left","am leaving","left"],ans:1},{q:"It's high time we ___ something about climate change.",opts:["do","did","have done","will do"],ans:1},{q:"The film was so boring that I ___ have fallen asleep…",opts:["might","must","would","should"],ans:2},{q:"Not only ___ the best player, but she also captained the team.",opts:["she was","was she","she had been","had she been"],ans:1}];
const READING_QS=["What is the main change described in the article?","What are TWO advantages of micro-credentials mentioned?","What concern do critics raise? (own words)","Why might Generation Z question traditional degrees? (inference)","What is the article's conclusion? Do you agree?"];
const SK_PHRASES={travel:["Could you point me in the right direction?","Is this included in the price?","I seem to have lost my way.","I'm afraid there's been a mix-up.","Would it be possible to...?","Do you happen to know if...?"],gaming:["I got absolutely destroyed.","Can we run it back?","That was absolutely clutch.","I'm on a losing streak.","GG, no cap.","Don't flame me, I'm trying."],media:["It really grew on me.","The writing is tight.","I didn't see that plot twist coming.","They really dropped the ball in season 2.","It's binge-worthy, honestly.","I'm saving that one for a rainy day."],social:["Just to clarify what I meant…","That's a fair point, actually.","I'm not gonna lie…","No worries at all!","Hit me up if you're in town.","Catch you later!"]};
const ESCENE_NAMES=["Scene 1: Heathrow Arrivals 🛬","Scene 2: Outside the Terminal 🚕","Scene 3: Which Tube line? 🗺️","Scene 4: On the Tube 🚇","Scene 5: Hotel Reception 🏨","Scene 6: The Hotel Note 🔐"];
const ESCENE_WRITES={0:"Report the missing bag to the airline desk",1:"Politely decline the taxi, say you'll take the Tube",3:"Keep small talk going — ask the stranger a question",4:"Warm, natural reply to the receptionist (own words)"};

function esc(s){return(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hasText(s){return s&&String(s).trim().length>0;}
function answeredBlock(text){return hasText(text)?`<div class="a">${esc(text)}</div>`:`<div class="a empty">— пусто —</div>`;}

function render(d){
  if(!d){content.innerHTML=`<div class="empty-state"><div class="em">📭</div><div class="t">Пока нет данных</div><div>Ученик ещё не открыл задание или не начал отвечать.</div></div>`;return;}

  const name=hasText(d.name)?esc(d.name):'Без имени';
  const upd=d.updatedAt?new Date(d.updatedAt):null;
  const updStr=upd?upd.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
  const sec=(d.section??0);

  let h=`<div class="student-bar"><div style="font-size:30px">🎓</div><div><div class="who">${name}</div><div class="meta">Дошёл(ла) до задания ${Math.min(sec+1,8)} из 8</div></div></div>`;
  h+=`<div class="updated">Последнее обновление: ${updStr}</div>`;

  // 1. BINGO
  const bingo=Array.isArray(d.bingo)?d.bingo:[];
  h+=card('Activity 1','Summer Plans Bingo 🎰',
    badge(bingo.length>0||hasText(d.bingoText)),
    `<div class="qa"><div class="q">Отмеченные квадраты (${bingo.length}):</div>${bingo.length?`<div class="chips">${bingo.map(b=>`<span class="chip sun">${esc(b)}</span>`).join('')}</div>`:`<div class="none">ничего не отмечено</div>`}</div>
     <div class="qa"><div class="q">✍️ Письменное задание (will / going to / if…):</div>${answeredBlock(d.bingoText)}</div>`);

  // 2. VOCAB
  const vm=d.vocabMatched||{};const vmCount=Object.keys(vm).length;
  h+=card('Activity 2','Idioms & Collocations 🔤',
    badge(hasText(d.vocab_s1)||hasText(d.vocab_s2),vmCount===8),
    `<div class="qa"><div class="q">Сопоставлено идиом: <b style="color:#fff">${vmCount} / 8</b></div></div>
     <div class="qa"><div class="q">Предложение 1:</div>${answeredBlock(d.vocab_s1)}</div>
     <div class="qa"><div class="q">Предложение 2:</div>${answeredBlock(d.vocab_s2)}</div>`);

  // 3. GRAMMAR
  const ga=d.grammarAnswers||{};const gaCount=Object.keys(ga).length;
  let score=0;Object.entries(ga).forEach(([i,v])=>{if(parseInt(v)===GRAMMAR[i].ans)score++;});
  let grows='';
  GRAMMAR.forEach((g,i)=>{
    const picked=ga[i];
    let val,cls;
    if(picked===undefined){val='—';cls='none';}
    else{const ok=parseInt(picked)===g.ans;cls=ok?'right':'wrong';val=(ok?'✓ ':'✗ ')+esc(g.opts[picked]);}
    grows+=`<div class="num">${i+1}.</div><div class="gq">${esc(g.q.replace(/<[^>]+>/g,''))}</div><div class="gv ${cls}">${val}</div>`;
    if(i<GRAMMAR.length-1)grows+=`<div class="gline"></div>`;
  });
  h+=card('Activity 3',`Grammar Challenge 🧩 <span class="score-pill">${score}/8</span>`,
    badge(gaCount>0,gaCount===8),
    `<div class="grow">${grows}</div>`);

  // 4. READING
  const ra=d.readingAnswers||{};
  let rblocks='';
  READING_QS.forEach((q,i)=>{rblocks+=`<div class="qa"><div class="q">${i+1}. ${esc(q)}</div>${answeredBlock(ra[i])}</div>`;});
  const rAnswered=Object.values(ra).filter(hasText).length;
  h+=card('Activity 4','Reading & Inference 📖',badge(rAnswered>0,rAnswered===5),rblocks);

  // 5. SURVIVAL KIT
  const sp=d.skPicked||{};
  const pickedPhrases=[];
  Object.keys(sp).forEach(k=>{if(sp[k]){const [cat,idx]=k.split('_');if(SK_PHRASES[cat]&&SK_PHRASES[cat][idx])pickedPhrases.push(SK_PHRASES[cat][idx]);}});
  h+=card('Activity 5','English Survival Kit 🧳',
    badge(pickedPhrases.length>0||hasText(d.sk_s1)||hasText(d.sk_s2)),
    `<div class="qa"><div class="q">Выбранные фразы (${pickedPhrases.length}):</div>${pickedPhrases.length?`<div class="chips">${pickedPhrases.map(p=>`<span class="chip">${esc(p)}</span>`).join('')}</div>`:`<div class="none">ничего не выбрано</div>`}</div>
     <div class="qa"><div class="q">✍️ Предложение 1:</div>${answeredBlock(d.sk_s1)}</div>
     <div class="qa"><div class="q">✍️ Предложение 2:</div>${answeredBlock(d.sk_s2)}</div>`);

  // 6. LOST IN LONDON
  const ec=d.escapeChoices||{};const ew=d.escapeWrites||{};
  let scenes='';
  ESCENE_NAMES.forEach((nm,i)=>{
    let verdict;
    if(ec[i]===undefined)verdict='<span class="verdict na">не пройдено</span>';
    else if(ec[i]===true)verdict='<span class="verdict good">✓ верно</span>';
    else verdict='<span class="verdict bad">✗ ошибка</span>';
    scenes+=`<div class="scene-row"><div class="scene-name">${esc(nm)} ${verdict}</div>`;
    if(ESCENE_WRITES[i]!==undefined){
      scenes+=`<div class="q" style="margin-top:6px">✍️ ${esc(ESCENE_WRITES[i])}:</div>${answeredBlock(ew[i])}`;
    }
    scenes+=`</div>`;
  });
  const ecCount=Object.keys(ec).length;
  h+=card('Activity 6','Lost in London 🇬🇧',badge(ecCount>0,ecCount===6),scenes);

  // 7. WOULD YOU RATHER
  const wc=d.wyrChoices||{};const we=d.wyrExplain||{};
  const WYR=[["Travel to 5 countries, only speak English","Stay home, become fluent in a new language"],["Binge a series in English, no subtitles","Read a 600-page English novel"],["Give a 5-min speech to 100 strangers","Write a 1000-word essay, no spell-check"],["AI corrects every sentence for a month","Strict teacher corrects every spoken mistake"],["Live in London 1 year, no Russian","Daily tutor for one year"],["Summer job speaking English 8h/day","Game online with native speakers nightly"]];
  let wyr='';
  WYR.forEach((pair,i)=>{
    const pick=wc[i];
    const pickTxt=pick===undefined?'<span class="none">не выбрано</span>':`<b>${esc(pair[pick])}</b>`;
    wyr+=`<div class="wyr-row"><div class="wyr-pick">${i+1}. Выбор: ${pickTxt}</div><div class="q">✍️ Объяснение:</div>${answeredBlock(we[i])}</div>`;
  });
  const wcCount=Object.keys(wc).length;
  h+=card('Activity 7','Would You Rather? 🤔',badge(wcCount>0,wcCount===6),wyr);

  // 8. ASSIGNMENT
  const ao=Array.isArray(d.assignOptional)?d.assignOptional:[];
  h+=card('Activity 8','Summer Assignment 📋',badge(ao.length>0,ao.length>=2),
    `<div class="qa"><div class="q">Выбранные дополнительные задания (${ao.length}/2):</div>${ao.length?`<div class="chips">${ao.map(a=>`<span class="chip mint">${esc(a)}</span>`).join('')}</div>`:`<div class="none">пока не выбрано</div>`}</div>`);

  content.innerHTML=h;
}

function card(label,title,badgeHtml,body){
  return `<div class="card"><div class="card-label">${label}</div><div class="card-title">${title} ${badgeHtml}</div>${body}</div>`;
}
function badge(started,complete){
  if(complete)return '<span class="badge ok">готово</span>';
  if(started)return '<span class="badge partial">в процессе</span>';
  return '<span class="badge empty">пусто</span>';
}

onSnapshot(SHARED,(snap)=>{
  live.className='live on';liveTxt.textContent='в эфире';
  const data=snap.exists()?snap.data():null;
  render(data&&data.student?data.student:null);
},(err)=>{
  live.className='live';liveTxt.textContent='ошибка связи';
  console.error("Firestore read failed:",err.code,err.message);const reason=err.code==='permission-denied'?'Нет доступа: правила Firestore блокируют чтение lessonSessions. Проверьте, что правила обновлены в проекте polytalky-2228d.':(err.message||'Проверьте интернет.');content.innerHTML=`<div class="empty-state"><div class="em">⚠️</div><div class="t">Не удалось подключиться</div><div>${esc(reason)}</div><div style="margin-top:14px;font-size:11px;color:#ffffff44">проект: polytalky-2228d · путь: lessonSessions/shared_lesson</div></div>`;
});
</script>
</body>
</html>
